<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>6/30 生日小書</title>
<style>
:root {
  --ink: #0a2f98;
  --paper: #fff7e9;
  --paper2: #fbedd8;
  --brown: #7b5a3d;
  --gold: #ba8550;
  --shadow: rgba(64, 38, 13, .25);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; min-height: 100%; }
body {
  min-height: 100svh;
  display: grid;
  place-items: center;
  padding: max(16px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
  color: #30251d;
  font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
  background:
    radial-gradient(circle at 10% 5%, rgba(255,255,255,.85), transparent 28%),
    radial-gradient(circle at 85% 10%, rgba(255,255,255,.55), transparent 24%),
    linear-gradient(135deg, #f7e8d1 0%, #e2c39d 52%, #ad7c4d 100%);
  overflow-x: hidden;
}
.app {
  width: min(94vw, 470px);
  text-align: center;
}
.book-wrap {
  width: min(90vw, 410px);
  height: min(130vw, 590px);
  max-height: 72svh;
  min-height: 480px;
  margin: 0 auto;
  perspective: 1900px;
  position: relative;
}
.book {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  filter: drop-shadow(0 26px 24px rgba(52, 29, 10, .24));
}
.book::before {
  content: "";
  position: absolute;
  inset: 10px auto 10px 11px;
  width: 16px;
  border-radius: 16px;
  background: linear-gradient(to right, rgba(86, 51, 23, .25), rgba(86, 51, 23, .05), transparent);
  z-index: 8;
  pointer-events: none;
}
.book::after {
  content: "";
  position: absolute;
  right: -5px;
  bottom: 10px;
  width: 94%;
  height: 18px;
  border-radius: 50%;
  background: rgba(79, 47, 21, .16);
  filter: blur(10px);
  z-index: -1;
}
.page-face,
.flip-sheet {
  position: absolute;
  inset: 0;
  border-radius: 12px 22px 22px 12px;
  background:
    linear-gradient(90deg, rgba(106, 64, 24, .16), rgba(106,64,24,.035) 8%, transparent 18%, transparent 90%, rgba(106,64,24,.05)),
    repeating-linear-gradient(0deg, rgba(92, 70, 42, .022) 0px, rgba(92, 70, 42, .022) 1px, transparent 1px, transparent 7px),
    var(--paper);
  border: 1px solid rgba(119, 83, 43, .26);
  box-shadow:
    inset 18px 0 22px rgba(102, 63, 28, .07),
    inset -10px 0 18px rgba(102, 63, 28, .055),
    0 16px 30px rgba(55, 32, 13, .16);
  overflow: hidden;
}
.page-face {
  z-index: 2;
}
.flip-sheet {
  z-index: 20;
  transform-origin: left center;
  transform-style: preserve-3d;
  pointer-events: none;
}
.flip-next {
  animation: flipNext .86s cubic-bezier(.18,.72,.26,1) forwards;
}
.flip-prev {
  animation: flipPrev .86s cubic-bezier(.18,.72,.26,1) forwards;
}
@keyframes flipNext {
  0% { transform: rotateY(0deg); opacity: 1; box-shadow: 0 20px 30px rgba(55,32,13,.18); }
  45% { transform: rotateY(-92deg) translateZ(8px); opacity: .95; }
  100% { transform: rotateY(-178deg); opacity: 0; box-shadow: -20px 20px 28px rgba(55,32,13,.10); }
}
@keyframes flipPrev {
  0% { transform: rotateY(-178deg); opacity: 0; }
  45% { transform: rotateY(-92deg) translateZ(8px); opacity: .95; }
  100% { transform: rotateY(0deg); opacity: 1; }
}
.page-inner {
  position: relative;
  z-index: 2;
  height: 100%;
  padding: 28px 28px 30px 38px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
}
.page-label {
  font-size: clamp(.92rem, 3.6vw, 1.05rem);
  font-weight: 800;
  letter-spacing: .08em;
  color: var(--gold);
  margin: 0;
}
.illus-area {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 130px;
  max-height: 238px;
  flex: 0 0 auto;
}
.illus-area img {
  display: block;
  max-width: 92%;
  max-height: 220px;
  object-fit: contain;
  filter: drop-shadow(0 4px 0 rgba(10,47,152,.035));
}
.multi-img {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
  width: 100%;
  align-items: center;
  justify-items: center;
  min-height: 112px;
  max-height: 150px;
}
.multi-img img {
  max-width: 112%;
  max-height: 126px;
}
.page-body {
  color: #2f2a25;
  font-size: clamp(.91rem, 3.6vw, 1.08rem);
  line-height: 1.72;
  letter-spacing: .035em;
  text-align: center;
  white-space: pre-line;
  word-break: keep-all;
}
.cover-page .page-inner {
  justify-content: center;
  gap: 20px;
}
.cover-page .page-label {
  color: #2f2a25;
  font-size: clamp(1.6rem, 8vw, 2.2rem);
  letter-spacing: .05em;
}
.cover-page .page-body {
  color: var(--ink);
  font-weight: 900;
  font-size: clamp(1.75rem, 8vw, 2.35rem);
  line-height: 1.25;
}
.cover-page .illus-area {
  max-height: 300px;
}
.cover-page .illus-area img {
  max-height: 285px;
  max-width: 82%;
}
.ending-page .page-body {
  font-size: clamp(1rem, 4vw, 1.18rem);
  line-height: 1.9;
}
.corner {
  position: absolute;
  right: 18px;
  bottom: 18px;
  width: 30px;
  height: 30px;
  opacity: .45;
  background: linear-gradient(135deg, transparent 49%, rgba(150, 105, 55, .22) 50%);
  border-bottom-right-radius: 16px;
}
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 16px;
}
button {
  border: 0;
  border-radius: 999px;
  padding: 11px 18px;
  background: rgba(255, 248, 237, .86);
  color: #4d3421;
  font-weight: 800;
  font-size: .98rem;
  box-shadow: 0 8px 16px rgba(71, 41, 17, .15);
  cursor: pointer;
}
button:active { transform: translateY(1px); }
button:disabled { opacity: .35; cursor: default; transform: none; }
.counter {
  min-width: 76px;
  color: rgba(52, 35, 23, .72);
  font-weight: 900;
  letter-spacing: .04em;
}
.hint {
  margin-top: 10px;
  color: rgba(52, 35, 23, .58);
  font-size: .84rem;
  letter-spacing: .04em;
}
@media (max-width: 420px) {
  .book-wrap {
    width: 92vw;
    height: min(135vw, 590px);
    min-height: 470px;
    max-height: 70svh;
  }
  .page-inner {
    padding: 22px 22px 24px 30px;
    gap: 8px;
  }
  .illus-area {
    min-height: 108px;
    max-height: 190px;
  }
  .illus-area img {
    max-height: 182px;
  }
  .multi-img {
    max-height: 124px;
    min-height: 96px;
  }
  .multi-img img {
    max-height: 106px;
  }
  .page-body {
    font-size: clamp(.82rem, 3.45vw, .98rem);
    line-height: 1.62;
  }
  .controls {
    gap: 10px;
  }
  button {
    padding: 10px 15px;
  }
}
@media (max-height: 720px) {
  .book-wrap {
    max-height: 68svh;
    min-height: 430px;
  }
  .page-inner {
    padding-top: 20px;
    padding-bottom: 22px;
  }
  .illus-area {
    min-height: 95px;
    max-height: 165px;
  }
  .illus-area img {
    max-height: 156px;
  }
  .multi-img {
    max-height: 110px;
  }
  .multi-img img {
    max-height: 96px;
  }
  .page-body {
    font-size: clamp(.78rem, 3.2vw, .94rem);
    line-height: 1.52;
  }
}
</style>
</head>
